<div class="min-h-screen flex flex-col lg:flex-row">
  
  <div class="hidden lg:flex w-1/2 bg-brand-900 text-white items-center justify-center p-12 relative overflow-hidden">
    <div class="absolute -top-24 -right-24 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-brand-600/20 rounded-full blur-3xl"></div>

    <div class="relative z-10 max-w-md">
      <div class="w-12 h-12 rounded bg-brand-600 flex items-center justify-center text-white font-bold text-2xl mb-6">H</div>
      <h1 class="text-4xl font-bold mb-4">Join Hoodle</h1>
      <p class="text-brand-100 text-lg mb-8">Get your entire company's spending under control in minutes. No credit card required to start.</p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 bg-white flex items-center justify-center p-8 sm:p-12">
    <div class="w-full max-w-md">
      
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Create your account</h2>
        <p class="text-gray-500">Set up your enterprise workspace</p>
      </div>

      <div *ngIf="errorMessage" class="mb-4 p-3 rounded-lg bg-red-50 text-red-600 text-sm border border-red-200">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div>
          <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" id="fullName" name="fullName" [(ngModel)]="fullName" required
            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-600 focus:border-brand-600 outline-none transition-all">
        </div>

        <div>
          <label for="companyName" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
          <input type="text" id="companyName" name="companyName" [(ngModel)]="companyName" required
            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-600 focus:border-brand-600 outline-none transition-all">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Work Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="email" required
            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-600 focus:border-brand-600 outline-none transition-all">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" required
            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-600 focus:border-brand-600 outline-none transition-all">
        </div>

        <button type="submit" [disabled]="isLoading" 
          class="w-full bg-brand-600 hover:bg-brand-800 text-white font-medium py-2.5 rounded-lg transition-colors mt-4 disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center">
          <span *ngIf="!isLoading">Create Workspace</span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating...
          </span>
        </button>

      </form>

      <div class="mt-8 pt-6 border-t border-gray-200">
        <p class="text-center text-sm text-gray-600">
          Already have an account? 
          <a routerLink="/signin" class="font-medium text-brand-600 hover:text-brand-800">Sign in</a>
        </p>
      </div>

    </div>
  </div>
</div>
