<div class="space-y-6">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Purchase Requests</h1>
      <p class="text-sm text-gray-500 mt-1">Manage and track all internal procurement requests.</p>
    </div>

    <button
      class="bg-brand-600 hover:bg-brand-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center gap-2" (click)="openDrawer()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Raise Request
    </button>
  </div>

  <app-data-table [columns]="prqColumns" [data]="prqData" [selectable]="true" [showPagination]="true"
    [currentPage]="currentPage" [totalPages]="totalPages" [totalElements]="totalElements" [pageSize]="pageSize"
    (actionClicked)="handleTableAction($event)" (pageChanged)="handlePageChange($event)">
  </app-data-table>

  <app-side-drawer [isOpen]="isDrawerOpen" title="Raise Purchase Request" (closed)="closeDrawer()">
    
    <form #prqForm="ngForm" class="space-y-6">
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Department <span class="text-red-500">*</span></label>
          <input type="text" name="department" [(ngModel)]="newRequest.department" required #deptCtrl="ngModel"
            placeholder="e.g. Research & Development"
            [class.border-red-500]="deptCtrl.invalid && deptCtrl.touched"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-600 transition-colors">
          @if (deptCtrl.invalid && deptCtrl.touched) {
            <p class="text-xs text-red-500 mt-1">Department is required.</p>
          }
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Remarks</label>
          <textarea name="remarks" [(ngModel)]="newRequest.remarks" rows="2" placeholder="Reason for request..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-600"></textarea>
        </div>
      </div>

      <hr class="border-gray-200">

      <div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-bold text-gray-900">Request Items</h3>
          <span class="text-xs font-medium text-gray-500">Total: {{ requestTotal | currency:'INR' }}</span>
        </div>

        <div class="space-y-4">
          @for (item of newRequest.items; track $index) {
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group">
              
              @if (newRequest.items.length > 1) {
                <button type="button" (click)="removeItem($index)" class="absolute -top-2 -right-2 bg-white border border-gray-200 text-gray-400 hover:text-red-600 rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
              }

              <div class="grid grid-cols-1 gap-3">
                <div>
                  <label class="block text-xs font-medium text-gray-600 mb-1">Item Name <span class="text-red-500">*</span></label>
                  <input type="text" [name]="'itemName' + $index" [(ngModel)]="item.itemName" required #nameCtrl="ngModel"
                    [class.border-red-500]="nameCtrl.invalid && nameCtrl.touched"
                    class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-brand-600">
                </div>
                <div>
                  <label class="block text-xs font-medium text-gray-600 mb-1">Description</label>
                  <input type="text" [name]="'desc' + $index" [(ngModel)]="item.description" 
                    class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-brand-600">
                </div>
                <div class="flex gap-3">
                  <div class="w-1/3">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Qty <span class="text-red-500">*</span></label>
                    <input type="number" min="1" [name]="'qty' + $index" [(ngModel)]="item.quantity" required #qtyCtrl="ngModel"
                      [class.border-red-500]="qtyCtrl.invalid && qtyCtrl.touched"
                      class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-brand-600">
                  </div>
                  <div class="w-2/3">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Unit Price <span class="text-red-500">*</span></label>
                    <input type="number" min="0.01" [name]="'price' + $index" [(ngModel)]="item.unitPrice" required #priceCtrl="ngModel"
                      [class.border-red-500]="priceCtrl.invalid && priceCtrl.touched"
                      class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-brand-600">
                  </div>
                </div>
              </div>
            </div>
          }
        </div>

        <button type="button" (click)="addItem()" class="mt-3 text-sm font-medium text-brand-600 hover:text-brand-800 flex items-center gap-1 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add another item
        </button>
      </div>
    </form>

    <div drawer-footer class="w-full flex justify-end gap-3">
      <button type="button" (click)="closeDrawer(prqForm)" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="submitRequest(prqForm)" [disabled]="isSubmitting || isSuccess || prqForm.invalid" 
        class="px-4 py-2 text-sm font-medium text-white rounded-lg transition-all duration-300 flex items-center min-w-[140px] justify-center"
        [ngClass]="{
          'bg-green-600 hover:bg-green-700': isSuccess,
          'bg-brand-600 hover:bg-brand-800': !isSuccess,
          'opacity-50 cursor-not-allowed': (isSubmitting || prqForm.invalid) && !isSuccess
        }">
        
        @if (isSubmitting) {
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          Submitting...
        } @else if (isSuccess) {
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
          Success!
        } @else {
          Submit Request
        }
        
      </button>
    </div>
    
  </app-side-drawer>
</div>
