<div 
  class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity duration-300 z-40"
  [class.opacity-0]="!isOpen" 
  [class.pointer-events-none]="!isOpen"
  (click)="closeDrawer()">
</div>

<div 
  class="fixed inset-y-0 right-0 z-50 w-full max-w-md bg-white shadow-2xl flex flex-col transform transition-transform duration-300 ease-in-out"
  [class.translate-x-full]="!isOpen" 
  [class.translate-x-0]="isOpen">
  
  <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-white">
    <h2 class="text-lg font-bold text-brand-900">{{ title }}</h2>
    
    <button (click)="closeDrawer()" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-brand-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto p-6 bg-white">
    <ng-content></ng-content>
  </div>

  <div class="border-t border-gray-200 bg-gray-50 px-6 py-4 flex justify-end gap-3">
    <ng-content select="[drawer-footer]"></ng-content>
  </div>
  
</div>
