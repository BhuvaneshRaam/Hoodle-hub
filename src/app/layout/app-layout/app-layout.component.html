<div class="flex h-screen bg-gray-50 font-sans overflow-hidden">

  <aside [class.w-64]="!isSidebarCollapsed" [class.w-20]="isSidebarCollapsed"
    class="bg-brand-900 text-gray-300 flex flex-col shadow-2xl z-20 transition-all duration-300 ease-in-out relative">

    <div class="h-16 flex items-center px-6 border-b border-brand-800/50 whitespace-nowrap overflow-hidden">
      <div class="w-8 h-8 min-w-[2rem] rounded bg-brand-600 flex items-center justify-center mr-3 text-white font-bold">
        H</div>
      <div class="flex flex-col opacity-100 transition-opacity duration-300" [class.opacity-0]="isSidebarCollapsed"
        [class.hidden]="isSidebarCollapsed">
        <span class="text-sm font-bold text-white leading-tight">Hoodle</span>
        <span class="text-xs text-brand-300 leading-tight">{{ user()?.tenantName }}</span>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 space-y-2 text-sm font-medium overflow-x-hidden">

      <a routerLink="/app/dashboard" routerLinkActive="bg-brand-800 text-white border-l-4 border-brand-400"
        class="flex items-center px-6 py-3 transition-colors hover:text-white hover:bg-brand-800/50 border-l-4 border-transparent group whitespace-nowrap">
        <svg class="w-5 h-5 min-w-[1.25rem] mr-4 text-brand-400 group-hover:text-white" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
          </path>
        </svg>
        <span [class.opacity-0]="isSidebarCollapsed" class="transition-opacity duration-300">Dashboard</span>
      </a>

      <a routerLink="/app/requests" routerLinkActive="bg-brand-800 text-white border-l-4 border-brand-400"
        class="flex items-center justify-between px-6 py-3 transition-colors hover:text-white hover:bg-brand-800/50 border-l-4 border-transparent group whitespace-nowrap">
        <div class="flex items-center">
          <svg class="w-5 h-5 min-w-[1.25rem] mr-4 text-brand-400 group-hover:text-white" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
            </path>
          </svg>
          <span [class.opacity-0]="isSidebarCollapsed" class="transition-opacity duration-300">Requests</span>
        </div>
        @if (!isSidebarCollapsed) {
        <span class="bg-brand-600 text-white text-xs py-0.5 px-2 rounded-full font-bold">12</span>
        }
      </a>

      <a routerLink="/app/inventory" routerLinkActive="bg-brand-800 text-white border-l-4 border-brand-400"
        class="flex items-center px-6 py-3 transition-colors hover:text-white hover:bg-brand-800/50 border-l-4 border-transparent group whitespace-nowrap mt-6">
        <svg class="w-5 h-5 min-w-[1.25rem] mr-4 text-brand-400 group-hover:text-white" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        <span [class.opacity-0]="isSidebarCollapsed" class="transition-opacity duration-300">Inventory</span>
      </a>

      <a routerLink="/app/vendors" routerLinkActive="bg-brand-800 text-white border-l-4 border-brand-400"
        class="flex items-center px-6 py-3 transition-colors hover:text-white hover:bg-brand-800/50 border-l-4 border-transparent group whitespace-nowrap">
        <svg class="w-5 h-5 min-w-[1.25rem] mr-4 text-brand-400 group-hover:text-white" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
          </path>
        </svg>
        <span [class.opacity-0]="isSidebarCollapsed" class="transition-opacity duration-300">Vendors</span>
      </a>

    </nav>

    <div class="border-t border-brand-800/50 bg-brand-950/30 flex justify-end">
      <button (click)="toggleSidebar()"
        class="w-full h-12 flex items-center justify-center text-brand-400 hover:text-white hover:bg-brand-800/50 transition-colors">
        <svg [class.rotate-180]="isSidebarCollapsed" class="w-5 h-5 transition-transform duration-300" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">

    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm z-10">

      <h2 class="text-lg font-semibold text-gray-800">Workspace</h2>

      <div class="flex items-center space-x-6">

        <div class="relative hidden sm:block">
          <input type="text" placeholder="Search POs..."
            class="w-64 pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-600 transition-all">
          <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>

        <button class="relative p-2 text-gray-400 hover:text-brand-600 transition-colors rounded-lg hover:bg-brand-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
            </path>
          </svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <div class="h-6 w-px bg-gray-200"></div>
        <div class="relative">

          <div *ngIf="isUserMenuOpen" (click)="isUserMenuOpen = false" class="fixed inset-0 z-40"></div>

          <button (click)="toggleUserMenu()"
            class="relative z-50 flex items-center hover:bg-gray-50 p-1 rounded-full transition-colors cursor-pointer outline-none focus:ring-1 focus:ring-brand-600 focus:ring-offset-1">
            <div
              class="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-900 font-bold text-sm border border-brand-200 shadow-sm">
              {{ user()?.userName?.charAt(0) | uppercase }}
            </div>
          </button>

          <div *ngIf="isUserMenuOpen"
            class="absolute right-0 mt-3 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-50 transform transition-all origin-top-right">

            <div
              class="absolute right-3 -top-1.5 w-3 h-3 bg-white border-t border-l border-gray-200 transform rotate-45">
            </div>

            <div class="relative z-10 bg-white">
              <div class="px-4 py-3 border-b border-gray-100">
                <p class="text-sm font-semibold text-gray-900 truncate" title="{{ user()?.userName }}">
                  {{ user()?.userName }}
                </p>
                <p class="text-xs text-gray-500 truncate" title="{{ user()?.emailId }}">
                  {{ user()?.emailId || 'Loading email...' }}
                </p>
              </div>

              <div class="py-1">
                <button type="button"
                  class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-brand-600 transition-colors">
                  My Profile
                </button>
                <button type="button"
                  class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-brand-600 transition-colors">
                  Workspace Settings
                </button>
              </div>

              <div class="border-t border-gray-100 py-1">
                <button (click)="onLogout()"
                  class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                  Sign out
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
